# Ожидаемые файлы весов (см. models/README.md). В Git не коммитятся — только манифест.
# required: true — без файла детектор может уйти в fallback или не найти активный датасет.

version: 1

files:
  - path: unified_classes.yaml
    required: true
    in_git: true
    description: Реестр унифицированных классов

  - path: aoi_unified.pt
    required: true
    in_git: false
    description: Основная модель проекта (инспекция)

  - path: pretrained/pcb-defects-6cls/yolov8n_pcb_defects_6cls.pt
    required: false
    in_git: false
    description: Публичный пресет PKU / 6 классов дефектов трассировки

  - path: pretrained/pcb-defect-seg/yolov8n_pcb_defect_seg.pt
    required: false
    in_git: false
    description: Сегментация дефектов PCB

  - path: pretrained/welding-defects/yolov8_welding_defects.pt
    required: false
    in_git: false
    description: Дефекты пайки (демо)

  - path: datasets/1/weights.pt
    required: false
    in_git: false
    description: Зарегистрированный датасет #1 (после download_datasets)
